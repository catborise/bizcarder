services:
  db:
    image: postgres:16-alpine
    container_name: crm_db
    deploy:
      resources:
        limits:
          memory: ${DB_MEMORY_LIMIT:-512M}
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-crm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-crm_password}
      - POSTGRES_DB=${POSTGRES_DB:-crm_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user} -d ${POSTGRES_DB:-crm_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crm_redis
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-128M}
    command: redis-server --maxmemory ${REDIS_MEMORY_LIMIT:-128M} --maxmemory-policy allkeys-lru --save ""
    sysctls:
      - net.core.somaxconn=511
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: ./backend
    container_name: crm_backend
    deploy:
      resources:
        limits:
          memory: ${BACKEND_MEMORY_LIMIT:-1024M}
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_USER=${POSTGRES_USER:-crm_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-crm_password}
      - DB_NAME=${POSTGRES_DB:-crm_db}
      - DB_POOL_MIN=${DB_POOL_MIN:-2}
      - DB_POOL_MAX=${DB_POOL_MAX:-10}
      - PORT=${PORT:-5000}
      - SESSION_SECRET=${SESSION_SECRET}
      - SESSION_SECURE=${SESSION_SECURE:-false}
      - CRM_API_ENCRYPTION_KEY=${CRM_API_ENCRYPTION_KEY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - FRONTEND_URL=${FRONTEND_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SAML_ENTRY_POINT=${SAML_ENTRY_POINT}
      - SAML_ISSUER=${SAML_ISSUER}
      - SAML_CALLBACK_URL=${SAML_CALLBACK_URL}
      - SAML_CERT=${SAML_CERT}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - crm_uploads:/app/uploads
      - crm_backups:/app/backups

  caddy:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile.caddy
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: crm_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - backend

volumes:
  pgdata:
  crm_uploads:
  crm_backups:
  redis_data:
  caddy_data:
  caddy_config:
